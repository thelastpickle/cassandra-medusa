[cassandra]
stop_cmd = echo "stop"
start_cmd = echo "start"
config_file = /etc/cassandra/cassandra.yaml
cql_username = 
cql_password = 
nodetool_username = 
nodetool_password = 
nodetool_host = 
nodetool_port = 
resolve_ip_addresses = True

[storage]
storage_provider = local
bucket_name = test-bucket
fqdn = localhost
host_file_separator = ,
max_backup_age = 0
max_backup_count = 0
api_profile = 
transfer_max_bandwidth = 50MB/s
concurrent_transfers = 1
multi_part_upload_threshold = 20971520
secure = True
ssl_verify = False
aws_cli_path = aws
region = default
backup_grace_period_in_days = 10
use_sudo_for_restore = True
multipart_chunksize = 50MB
s3_addressing_style = auto

[ssh]
username = cassandra
key_file = 
port = 22
cert_file = 
use_pty = False
keepalive_seconds = 60
login_shell = False

[checks]
health_check = cql
query = SELECT COUNT(*) FROM system.local
expected_rows = 1
expected_result = 
enable_md5_checks = False

[monitoring]
monitoring_provider = 
send_backup_name_tag = False

[logging]
enabled = false
file = medusa.log
level = INFO
format = [%(asctime)s] %(levelname)s: %(message)s
maxBytes = 20000000
backupCount = 50

[grpc]
enabled = true
max_send_message_length = 536870912
max_receive_message_length = 536870912
port = 50051
ca_cert = 
tls_cert = 
tls_key = 

[kubernetes]
enabled = false
cassandra_url = 
use_mgmt_api = False
ca_cert = 
tls_cert = 
tls_key = 


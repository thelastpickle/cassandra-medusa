[cassandra]
nodetool_flags = "-Dcom.sun.jndi.rmiURLParsing=legacy"
use_sudo = false

[storage]
use_sudo_for_restore = false
host_file_separator = ","
bucket_name = 10551-01-medusa-lab
key_file = ~/.aws/config
storage_provider = s3_compatible
api_profile = default
fqdn = 127.0.0.1
base_path = /tmp
prefix = fsa/test_medusa
multi_part_upload_threshold = 1024
aws_cli_path = aws
secure = True
region = default
host = s3.swiss-backup04.infomaniak.com
port = 443
backup_grace_period_in_days = 0
max_backup_count = 1
concurrent_transfers = 16

[monitoring]
monitoring_provider = local
